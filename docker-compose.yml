version: "3.8"

services:
  stream-manager:
    build: .
    container_name: streaming-system-247
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=streaming-manager-secret-superkey-2026
    volumes:
      # Persist SQLite database file
      - ./streaming.db:/app/streaming.db
      # Persist uploaded video assets and loop media files
      - ./uploads/videos:/app/uploads/videos
      # Persist brand overlay watermark files
      - ./uploads/logos:/app/uploads/logos
