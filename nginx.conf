# Nginx Reverse Proxy & SSL Configuration Template for Ubuntu VPS
# Move to /etc/nginx/sites-available/stream-system and symlink to sites-enabled/

server {
    listen 80;
    server_name stream.yourdomain.com; # Replace with your actual domain

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name stream.yourdomain.com; # Replace with your actual domain

    # SSL Certs (Managed by Let's Encrypt Certbot)
    # ssl_certificate /etc/letsencrypt/live/stream.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/stream.yourdomain.com/privkey.pem;

    # SSL Parameters Optimization
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Maximum file upload size limit (crucial for uploading high capacity MP4 loop video files)
    client_max_body_size 2G;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # Proxy Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable proxy buffering for streaming logs response
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
